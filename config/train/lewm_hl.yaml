defaults:
  - _self_
  - data: pusht_hl

output_model_name: hjepa
subdir: hjepa

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224

# pretrained LL checkpoint (object pickle saved by train.py)
ll_ckpt: ${oc.env:STABLEWM_HOME}/pusht/lewm_object.ckpt

trainer:
  max_epochs: 50
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: 128
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

optimizer:
  type: AdamW
  lr: 1e-4
  weight_decay: 1e-3

wandb:
  enabled: True
  config:
    entity: narendraaironi
    project: hwm
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: False

wm:
  type: hjepa
  k: 5                # HL stride in sampled frames
  ll_dim: 192
  hl_dim: 96
  macro_action_dim: 16
  action_dim: 2

hle:
  hidden_dim: 256

hlp:
  hidden_dim: 256
  depth: 3

mae:
  dim: 128
  depth: 2
  heads: 4
  mlp_dim: 512
  dim_head: 32

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024
