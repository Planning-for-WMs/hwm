dataset:
  num_steps: ${eval:'${wm.history} * ${wm.k_max} + 1'}  # history*K_max+1: covers max stride
  frameskip: 5
  name: pusht_expert_train_emb         # pre-encoded LL CLS (pre-projector); we apply ll.projector in the forward
  keys_to_load:
    - emb
    - action
    - proprio
    - state
  keys_to_cache:
    - action
    - proprio
    - state
