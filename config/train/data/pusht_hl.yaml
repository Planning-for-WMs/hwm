dataset:
  num_steps: ${eval:'${wm.k} + 1'}   # K+1 sampled frames per sample
  frameskip: 5
  name: pusht_expert_train_emb         # pre-encoded LL CLS (pre-projector); we apply ll.projector in the forward
  keys_to_load:
    - emb
    - action
    - proprio
    - state
  keys_to_cache:
    - action
    - proprio
    - state
