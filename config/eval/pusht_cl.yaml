defaults:
  - launcher: local
  - solver: cem
  - _self_

# Closed-loop flat MPC eval (non-hierarchical), for comparison against
# eval_unified.py / eval_hl.py. Set `plan_config.receding_horizon` (aliased
# below as `replan_every`) < `plan_config.horizon` to enable closed-loop.

world:
  env_name: swm/PushT-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ???
  history_size: 1
  frame_skip: 1

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio
    - state

seed: 42
policy: pusht/lewm   # ckpt name (relative to STABLEWM_HOME), or "random"

# `horizon`         : LL tokens planned per CEM call
# `replan_every`    : LL tokens executed between replans (alias for receding_horizon)
# `action_block`    : raw env-step actions per LL token (frameskip)
# Total env steps per plan = horizon * action_block.
# Total env steps between replans = replan_every * action_block.
replan_every: 5            # set = horizon for open-loop, < horizon for closed-loop
plan_config:
  horizon: 10
  receding_horizon: ${replan_every}
  action_block: 5

eval:
  num_eval: 50
  goal_offset_steps: 50
  eval_budget: 75
  img_size: 224
  dataset_name: pusht_expert_train
  callables:
    - method: _set_state
      args:
        state:
          value: state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state

output:
  filename: pusht_cl_results.txt
