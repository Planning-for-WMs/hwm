defaults:
  - launcher: local
  - _self_

policy_ckpt: ${oc.env:STABLEWM_HOME}/${subdir}/hjepa_epoch_50_object.ckpt
subdir: hjepa
cache_dir: null

world:
  env_name: swm/PushT-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ???
  history_size: 1
  frame_skip: 1

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio
    - state

seed: 42

# LL planning (Stage 2): plan K LL actions to reach subgoal
plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5

ll_solver:
  _target_: stable_worldmodel.solver.CEMSolver
  model: ???
  batch_size: 16
  num_samples: 300
  var_scale: 1.0
  n_steps: 30
  topk: 30
  device: "cuda"
  seed: ${seed}

# HL planning (Stage 1): macro action CEM
hl_cem:
  T_HL: 3            # plan 3 macro actions ahead
  num_samples: 300
  topk: 30
  n_steps: 30
  var_scale: 1.0

eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: pusht_weak_heldout
  callables:
    - method: _set_state
      args:
        state:
          value: state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state

output:
  filename: pusht_hl_results.txt
