defaults:
  - launcher: local
  - _self_

policy_ckpt: ${oc.env:STABLEWM_HOME}/${subdir}/hjepa_epoch_6_object.ckpt
subdir: hjepa
cache_dir: null

world:
  env_name: swm/PushT-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ???
  history_size: 1
  frame_skip: 1

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio
    - state

seed: 43

# Each LL action is `action_block` raw env-step actions.
# For strictly open-loop: eval_budget = T_HL * ll_cem.horizon * action_block.
action_block: 5

# Stage 2: chained open-loop LL CEM in latent space (one per subgoal).
# `horizon` is the LL action-sequence length per subgoal. The cost is at the
# predicted final LL emb, evaluated in HL space against the subgoal.
ll_cem:
  horizon: 5                # slack vs trained K=5 (predictor is suboptimal)
  num_samples: 1500
  topk: 10
  n_steps: 60
  var_scale: 1.0
  var_ema: 1.0              # variance multiplied by this each CEM iter

# Stage 1: HL CEM, planned once per episode. T_HL macro actions -> T_HL
# subgoals; the last subgoal is replaced with HLE(LL_goal).
hl_cem:
  T_HL: 6
  num_samples: 3000
  topk: 10
  n_steps: 100
  var_scale: 1.0
  var_ema: 1.0

eval:
  num_eval: 1
  goal_offset_steps: 150
  eval_budget: 200             # = T_HL * ll_cem.horizon * action_block
  img_size: 224
  dataset_name: pusht_expert_train
  callables:
    - method: _set_state
      args:
        state:
          value: state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state

output:
  filename: pusht_hl_results.txt
